<title>APEX</title>

<script>
const SB_URL = 'https://ecxnoyrnsozvfbbgzhuu.supabase.co';
const SB_KEY = 'sb_publishable_dJAiYEcRWJbt0DQiaznLIQ_b7tTECNh';
const UID = 'default_user';

async function sbReq(method, table, body, query) {
  const url = SB_URL + '/rest/v1/' + table + (query ? '?' + query : '');
  const res = await fetch(url, {
    method,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function sbLoad() {
  try {
    const [logs, sp, rl, tp] = await Promise.all([
      sbReq('GET', 'workout_logs', null, 'user_id=eq.' + UID + '&order=created_at.desc'),
      sbReq('GET', 'set_progress', null, 'user_id=eq.' + UID + '&order=updated_at.desc&limit=1'),
      sbReq('GET', 'run_logs', null, 'user_id=eq.' + UID + '&order=updated_at.desc&limit=1'),
      sbReq('GET', 'training_plans', null, 'user_id=eq.' + UID + '&order=updated_at.desc&limit=1')
    ]);
    wLog = (logs || []).map(l => ({
      plan: l.plan, date: l.date, totalSets: l.total_sets,
      durationSecs: l.duration_secs, exercises: l.exercises || [], newPRs: l.new_prs || []
    }));
    sP    = (sp && sp[0]) ? sp[0].data : {};
    rLog  = (rl && rl[0]) ? rl[0].data : [];
    plans = (tp && tp[0]) ? tp[0].data : JSON.parse(JSON.stringify(DEFAULT_PLANS));
    try { localStorage.setItem('trainapp_cache', JSON.stringify({wLog,sP,rLog,plans})); } catch(e) {}
  } catch(err) {
    console.error('Supabase load error:', err);
    try {
      const d = JSON.parse(localStorage.getItem('trainapp_cache') || localStorage.getItem('trainapp_v1') || '{}');
      wLog  = d.wLog  || [];
      sP    = d.sP    || {};
      rLog  = d.rLog  || [];
      plans = d.plans || JSON.parse(JSON.stringify(DEFAULT_PLANS));
    } catch(e) { plans = JSON.parse(JSON.stringify(DEFAULT_PLANS)); }
  }
}

async function sbSave() {
  try {
    try { localStorage.setItem('trainapp_cache', JSON.stringify({wLog,sP,rLog,plans})); } catch(e) {}
    const spRows = await sbReq('GET', 'set_progress', null, 'user_id=eq.' + UID);
    if (spRows && spRows.length > 0) {
      await sbReq('PATCH', 'set_progress', {data: sP, updated_at: new Date().toISOString()}, 'user_id=eq.' + UID);
    } else {
      await sbReq('POST', 'set_progress', {user_id: UID, data: sP});
    }
    const rlRows = await sbReq('GET', 'run_logs', null, 'user_id=eq.' + UID);
    if (rlRows && rlRows.length > 0) {
      await sbReq('PATCH', 'run_logs', {data: rLog, updated_at: new Date().toISOString()}, 'user_id=eq.' + UID);
    } else {
      await sbReq('POST', 'run_logs', {user_id: UID, data: rLog});
    }
    const tpRows = await sbReq('GET', 'training_plans', null, 'user_id=eq.' + UID);
    if (tpRows && tpRows.length > 0) {
      await sbReq('PATCH', 'training_plans', {data: plans, updated_at: new Date().toISOString()}, 'user_id=eq.' + UID);
    } else {
      await sbReq('POST', 'training_plans', {user_id: UID, data: plans});
    }
  } catch(err) { console.error('Supabase save error:', err); }
}

async function sbSaveWorkout(entry) {
  try {
    await sbReq('POST', 'workout_logs', {
      user_id: UID, plan: entry.plan, date: entry.date,
      total_sets: entry.totalSets, duration_secs: entry.durationSecs,
      exercises: entry.exercises, new_prs: entry.newPRs || []
    });
  } catch(err) { console.error('Supabase workout save error:', err); }
}

// Migrate old localStorage data to Supabase (runs once)
async function migrateIfNeeded() {
  try {
    const migrated = localStorage.getItem('sb_migrated');
    if (migrated) return;
    const old = JSON.parse(localStorage.getItem('trainapp_v1') || '{}');
    if (!old.wLog && !old.sP && !old.rLog) return;
    // Check if Supabase already has data
    const existing = await sbReq('GET', 'workout_logs', null, 'user_id=eq.' + UID + '&limit=1');
    if (existing && existing.length > 0) { localStorage.setItem('sb_migrated','1'); return; }
    // Migrate workouts
    if (old.wLog && old.wLog.length > 0) {
      for (const w of old.wLog) { await sbSaveWorkout(w); }
    }
    // Migrate sP, rLog, plans
    if (old.sP) sP = old.sP;
    if (old.rLog) rLog = old.rLog;
    if (old.plans) plans = old.plans;
    await sbSave();
    wLog = old.wLog || [];
    localStorage.setItem('sb_migrated','1');
    console.log('Migration complete!');
  } catch(e) { console.error('Migration error:', e); }
}
</script>

body{background:#16181f;color:#eceae4;font-family:Georgia,serif;min-height:100vh;overflow-x:hidden;}
.wrap{max-width:430px;margin:0 auto;padding-bottom:80px;}
.screen{padding:24px 16px 0;animation:up .3s ease;}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.bc{font-family:'Barlow Condensed',sans-serif;}
.cp{font-family:'Crimson Pro',serif;font-style:italic;}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(20,22,28,.98);backdrop-filter:blur(12px);border-top:1px solid #2c2f3d;display:flex;justify-content:space-around;padding:9px 0 18px;z-index:99;}
.nav-item{text-align:center;cursor:pointer;padding:0 4px;}
.nav-dot{width:12px;height:2px;background:#22c55e;border-radius:1px;margin:3px auto 0;}
.card{background:#1e2029;border:1px solid #2c2f3d;border-radius:11px;padding:13px 14px;}
.h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:38px;letter-spacing:-1px;color:#eceae4;margin-bottom:4px;}
.lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:2.5px;color:#4a4d5e;margin-bottom:8px;}
.btn{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:1px;border:none;border-radius:30px;padding:10px 20px;cursor:pointer;}
.btn:active{opacity:.75;transform:scale(.97);}
.plan-btn{border-radius:13px;padding:20px 16px;cursor:pointer;text-align:left;width:100%;border:none;margin-bottom:11px;}
.plan-btn:active{opacity:.8;}
.prog-card{border-radius:11px;padding:13px;margin-bottom:8px;}
.progress-bar{background:#252836;border-radius:2px;height:3px;overflow:hidden;margin-bottom:4px;}
.bar-fill{height:100%;border-radius:2px;transition:width .4s;}
/* Exercise card */
.ex-card{background:#1e2029;border:1px solid #2c2f3d;border-radius:13px;margin-bottom:10px;overflow:hidden;transition:border-color .2s;}
.ex-card-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px;}
.ex-card-bd{padding:0 14px 10px;}
/* Set row */
.set-row{padding:7px 0;border-top:1px solid #252836;}
.chk{width:32px;height:32px;border-radius:9px;border:2px solid #3a3d50;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;}
.chk:active{transform:scale(.88);}
.s-inp{background:transparent;border:none;outline:none;color:#eceae4;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;text-align:center;border-bottom:2px solid #3a3d50;padding-bottom:1px;}
.s-inp:focus{border-bottom-color:currentColor;}
.s-inp.reps{width:58px;}
.s-inp.kg{width:58px;}
.s-unit{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:#4a4d5e;letter-spacing:1px;}
.s-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:#4a4d5e;width:22px;flex-shrink:0;}
/* Timer overlay */
.t-ov{position:fixed;inset:0;background:rgba(14,16,22,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;}
</style>

let wx={phase:"select",planId:null,exs:[],ss:[],etimer:{on:false,ei:0,total:0,left:0,iv:null},newPRs:[],startTime:null,clockIv:null};

function startW(id){
  if(wx.etimer.iv)clearInterval(wx.etimer.iv);

  const exs=plan?plan.exercises:[];
  const ss=exs.map(ex=>Array.from({length:ex.sets},()=>({reps:ex.reps!=null?String(ex.reps):"",kg:ex.kg!=null?String(ex.kg):"",secs:ex.secs!=null?String(ex.secs):null,done:false})));
  wx={phase:"active",planId:id,exs,ss,etimer:{on:false,ei:0,total:0,left:0,iv:null},newPRs:[],startTime:Date.now(),clockIv:null};
  unlockAudio();

const planAC=()=>(plans[wx.planId]||DEFAULT_PLANS[wx.planId]||{color:"#22c55e"}).color;
// Shared AudioContext – created on first user tap, reused for all beeps
let _actx=null;
function getACtx(){
  if(!_actx){
    try{_actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  }
  if(_actx&&_actx.state==="suspended") _actx.resume();
  return _actx;
}
// Call this on any user interaction to unlock audio early
function unlockAudio(){getACtx();}

function playBeep(){
  const ctx=getACtx();
  if(!ctx)return;
  try{
    // 3 ascending beeps: 660 → 770 → 880 Hz
    [[0,660],[0.22,770],[0.44,880]].forEach(([t,freq])=>{
      const o=ctx.createOscillator();
      const g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;
      o.type="sine";
      g.gain.setValueAtTime(0,ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(0.5,ctx.currentTime+t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.22);
      o.start(ctx.currentTime+t);
      o.stop(ctx.currentTime+t+0.25);
    });
  }catch(e){}
}
function fmtDur(secs){const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;return h>0?h+"h "+m+"m":(m>0?m+"min "+s+"s":s+"s");}

function renderWorkout(){
  const app=document.getElementById("app");
  if(wx.phase==="select"){app.innerHTML=wSelectHTML();return;}
  if(wx.phase==="done"){app.innerHTML=wDoneHTML();return;}
  app.innerHTML=wActiveHTML();

  document.querySelectorAll(".s-inp").forEach(inp=>{
    inp.addEventListener("input",e=>{
      wx.ss[+e.target.dataset.ei][+e.target.dataset.si][e.target.dataset.f]=e.target.value;
    });
  });
  // long-press to delete set (600ms hold)
  let lpTimer=null;
  document.querySelectorAll("[data-longpress]").forEach(el=>{
    el.addEventListener("touchstart",()=>{
      const[ei,si]=el.dataset.longpress.split(",").map(Number);
      lpTimer=setTimeout(()=>{
        navigator.vibrate&&navigator.vibrate(40);
        deleteSet(ei,si);
      },600);
    },{passive:true});
    el.addEventListener("touchend",()=>clearTimeout(lpTimer));
    el.addEventListener("touchmove",()=>clearTimeout(lpTimer));
  });
  if(wx.etimer.on)showTimerOverlay();
}

function repsRowHTML(ei,si,s,ac){

  return `<div class="set-row" oncontextmenu="event.preventDefault();deleteSet(${ei},${si})" data-longpress="${ei},${si}">

        <input class="s-inp reps" data-ei="${ei}" data-si="${si}" data-f="reps" value="${s.reps}" inputmode="numeric" placeholder="—" style="color:${isDone?"#3a3d50":"#eceae4"};" ${isDone?"disabled":""}/>
        <span class="s-unit">×</span>
      </div>
      <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:4px">
        <input class="s-inp kg" data-ei="${ei}" data-si="${si}" data-f="kg" value="${s.kg}" inputmode="decimal" placeholder="—" style="color:${isDone?"#3a3d50":"#eceae4"};" ${isDone?"disabled":""}/>
        <span class="s-unit">kg</span>
      </div>
      <div class="chk" onclick="togSet(${ei},${si})" style="border-color:${isDone?ac:"#3a3d50"};background:${isDone?ac:"transparent"}">
        ${isDone?`<svg width="14" height="11" viewBox="0 0 14 11"><polyline points="1.5,5.5 5,9 12.5,1.5" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:""}
      </div>
    </div>
    ${prevHint?`<div style="padding-left:22px;padding-top:3px">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#4a4d5e;letter-spacing:.5px">↑ Letzte: ${prevHint}</span>
    </div>`:""}
  </div>`;
}

function timeRowHTML(ei,si,ex,s,ac){
  const isDone=s.done;
  const prev=lastSets(ex.name);
  const prevSet=prev&&prev[si]?prev[si]:null;
  return `<div class="set-row" oncontextmenu="event.preventDefault();deleteSet(${ei},${si})" data-longpress="${ei},${si}">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="s-num" style="color:${isDone?"#3a3d50":"#4a4d5e"}">${si+1}</div>
      <div style="flex:1">

          value="${s.secs!=null?s.secs:ex.secs}" inputmode="numeric"
          style="width:60px;font-size:22px;font-weight:900;color:${isDone?"#3a3d50":"#eceae4"};" ${isDone?"disabled":""}/>
        <span class="bc" style="font-size:13px;color:#4a4d5e">sek</span>
      </div>
        ${prevSet?`<div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#4a4d5e;margin-top:1px">↑ Letzte: ${ex.secs}s ✓</div>`:""}
      </div>

      <div class="chk" onclick="togSet(${ei},${si})" style="border-color:${isDone?ac:"#3a3d50"};background:${isDone?ac:"transparent"}">
        ${isDone?`<svg width="14" height="11" viewBox="0 0 14 11"><polyline points="1.5,5.5 5,9 12.5,1.5" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:""}

    </div>

function togSet(ei,si){
  wx.ss[ei][si].done=!wx.ss[ei][si].done;
  renderWorkout();
}

function startExT(ei){
  if(wx.etimer.iv)clearInterval(wx.etimer.iv);
  // Use the editable secs from the next undone set, fallback to exercise default
  const nextSet=wx.ss[ei].find(s=>!s.done);
  const secs=parseFloat(nextSet?.secs)||parseFloat(wx.exs[ei].secs)||30;
  wx.etimer={on:true,ei,total:secs,left:secs,iv:null};
  wx.etimer.iv=setInterval(()=>{
    wx.etimer.left--;
    const el=document.getElementById("etnum");
    const rg=document.getElementById("etrg");
    if(el)el.textContent=wx.etimer.left+"s";
    if(rg){const r=54,c=2*Math.PI*r;rg.setAttribute("stroke-dashoffset",c*(1-wx.etimer.left/wx.etimer.total));}
    if(wx.etimer.left<=0){
      clearInterval(wx.etimer.iv);wx.etimer.on=false;
      playBeep();
      const sets=wx.ss[ei];const ni=sets.findIndex(s=>!s.done);
      if(ni>=0)sets[ni].done=true;
      const ov=document.getElementById("etov");if(ov)ov.remove();
      renderWorkout();
    }
  },1000);
  showTimerOverlay();
}

function showTimerOverlay(){
  const ac=planAC();
  const ex=wx.exs[wx.etimer.ei];
  const r=54,c=2*Math.PI*r;
  const filled=c*(wx.etimer.left/wx.etimer.total);
  let ov=document.getElementById("etov");
  if(!ov){ov=document.createElement("div");ov.id="etov";ov.className="t-ov";document.body.appendChild(ov);}
  ov.innerHTML=`
    <div class="bc" style="font-size:10px;letter-spacing:3px;color:#7a7d8f;margin-bottom:6px">ÜBUNGS-TIMER</div>
    <div class="bc" style="font-weight:800;font-size:20px;color:#eceae4;margin-bottom:24px">${ex.name}</div>
    <svg width="150" height="150" style="margin-bottom:24px">
      <circle cx="75" cy="75" r="${r}" fill="none" stroke="#2c2f3d" stroke-width="7"/>
      <circle id="etrg" cx="75" cy="75" r="${r}" fill="none" stroke="${ac}" stroke-width="7"
        stroke-dasharray="${c}" stroke-dashoffset="${c-filled}"
        stroke-linecap="round" transform="rotate(-90 75 75)" style="transition:stroke-dashoffset .9s linear"/>
      <text id="etnum" x="75" y="82" text-anchor="middle" fill="#eceae4" font-size="32" font-family="'Barlow Condensed',sans-serif" font-weight="900">${wx.etimer.left}s</text>
    </svg>
    <div style="display:flex;gap:10px">
      <button class="btn" style="background:${ac};color:#fff" onclick="cancelExT()">ABBRECHEN</button>
      <button class="btn" style="background:#252836;border:1px solid #3a3d50;color:#7a7d8f" onclick="skipExT()">FERTIG ✓</button>
    </div>`;
}

function cancelExT(){
  clearInterval(wx.etimer.iv);wx.etimer.on=false;
  const ov=document.getElementById("etov");if(ov)ov.remove();
  renderWorkout();
}
function skipExT(){
  clearInterval(wx.etimer.iv);
  const ei=wx.etimer.ei;wx.etimer.on=false;
  const ov=document.getElementById("etov");if(ov)ov.remove();
  const ni=wx.ss[ei].findIndex(s=>!s.done);
  if(ni>=0)wx.ss[ei][ni].done=true;
  renderWorkout();
}

function finishW(){
  if(wx.clockIv)clearInterval(wx.clockIv);
  const totalSets=wx.ss.reduce((a,s)=>a+s.filter(r=>r.done).length,0);
  const durationSecs=wx.startTime?Math.floor((Date.now()-wx.startTime)/1000):0;
  const exercises={};
  wx.exs.forEach((ex,ei)=>{
    exercises[ex.name]=wx.ss[ei].filter(s=>s.done).map(s=>({reps:s.reps,kg:s.kg}));
  });
  const planLabel=(plans[wx.planId]||DEFAULT_PLANS[wx.planId]||{label:wx.planId?.toUpperCase()}).label;
  const _entry={plan:planLabel,date:new Date().toLocaleDateString("de-DE"),totalSets,exercises,durationSecs};
  wLog.push(_entry);
  sbSaveWorkout(_entry);
  wx.newPRs=checkNewPRs();
  save();wx.phase="done";renderWorkout();
}

function confirmFinishW(){
  const total=wx.ss.reduce((a,s)=>a+s.length,0);
  const done=wx.ss.reduce((a,s)=>a+s.filter(r=>r.done).length,0);
  const open=total-done;
  if(open===0){finishW();return;}
  showModal(
    "Training beenden?",
    open+" Satz/Sätze sind noch nicht abgehakt. Trotzdem als abgeschlossen speichern?",
    "BEENDEN",
    "#ff5c1a",
    ()=>{finishW();}
  );
}

function deleteSet(ei,si){
  showModal(
    "Satz löschen?",
    "Satz "+(si+1)+" von "+wx.exs[ei].name+" wirklich entfernen?",
    "LÖSCHEN",
    "#ff6b6b",
    ()=>{
      wx.ss[ei].splice(si,1);
      renderWorkout();
    }
  );
}

function lastSets(exName){
  for(let i=wLog.length-1;i>=0;i--){
    const w=wLog[i];
    const wPlanLabel=(plans[wx.planId]||DEFAULT_PLANS[wx.planId]||{label:wx.planId?.toUpperCase()}).label;
    if((w.plan===wx.planId?.toUpperCase()||w.plan===wPlanLabel)&&w.exercises&&w.exercises[exName]&&w.exercises[exName].length>0){
      return w.exercises[exName];
    }
  }
  return null;
}

    <div class="card" style="text-align:left;margin-bottom:20px">

function togSkTimer(){
  sx.tRun=!sx.tRun;

function confirmUnlock(key,lvl,idx){
  const name=SKILLS[key].progs[idx].name;
  showModal(
    "Level freischalten?",
    "<b>"+name+"</b><br><br>Als geschafft markieren?",
    "GESCHAFFT ✓",
    SKILLS[key].color,
    ()=>{ulSkill(key,lvl);}
  );
}

function confirmDowngrade(key,lvl){
  const s=SKILLS[key];
  const progName=s.progs[lvl-1]?.name||"";

    "Level zurücksetzen?",

      save();renderSkills();

function showModal(title,body,confirmTxt,confirmColor,onConfirm){
  let ov=document.getElementById("modal-ov");
  if(!ov){ov=document.createElement("div");ov.id="modal-ov";document.body.appendChild(ov);}
  ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:300;padding:24px";
  ov.innerHTML=`
    <div style="background:#1e2029;border:1px solid #2c2f3d;border-radius:16px;padding:24px;width:100%;max-width:340px">
      <div class="bc" style="font-weight:900;font-size:20px;letter-spacing:.5px;margin-bottom:10px">${title}</div>
      <div class="cp" style="font-size:14px;color:#7a7d8f;line-height:1.5;margin-bottom:22px">${body}</div>
      <div style="display:flex;gap:10px">
        <button class="btn" style="flex:1;background:#252836;border:1px solid #3a3d50;color:#eceae4" onclick="closeModal()">ABBRECHEN</button>
        <button class="btn" style="flex:1;background:${confirmColor};color:#fff" onclick="modalConfirm()">${confirmTxt}</button>
      </div>
    </div>`;
  ov._cb=onConfirm;
}
function closeModal(){const ov=document.getElementById("modal-ov");if(ov)ov.remove();}

function runDetailHTML(idx){
  const r=rLog[idx];
  if(!r)return runsListHTML();
  const mins=r.secs?Math.floor(r.secs/60):0;
  const secRem=r.secs?Math.floor(r.secs%60):0;
  const timeStr=mins+"min"+(secRem>0?" "+secRem+"s":"");
  const paceVal=r.km&&r.secs?r.secs/60/r.km:null;
  const paceDisp=paceVal?paceStr(paceVal):"–";
  const kmhDisp=paceVal?(60/paceVal).toFixed(1):"–";

  // Build km splits from splits data if available
  const splits=r.splits||[];
  const hasSplits=splits.length>0;

  // SVG pace chart from splits
  const W=340,H=190,padL=48,padR=12,padT=16,padB=30;
  let chartSVG="";
  if(hasSplits&&splits.length>=2){
    const paces=splits.map(s=>s.pace);
    const minP=Math.min(...paces);
    const maxP=Math.max(...paces);
    const range=maxP-minP||0.5;
    // INVERT: faster (lower pace) = higher on chart
    const pts=splits.map((s,i)=>{
      const x=padL+(i/(splits.length-1))*(W-padL-padR);
      const y=padT+((s.pace-minP)/range)*(H-padT-padB); // lower pace = smaller y = higher
      return {x,y,s};
    });
    const path=pts.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(" ");
    const area=`M${pts[0].x},${H-padB} `+pts.map(p=>`L${p.x},${p.y}`).join(" ")+` L${pts[pts.length-1].x},${H-padB} Z`;
    // Y axis: show min (fast) at top, max (slow) at bottom – 3 labels
    const grids=[minP, minP+range/2, maxP].map((p,fi)=>{
      const y=padT+(fi/2)*(H-padT-padB);
      return `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#252836" stroke-width="1"/>
              <text x="${padL-5}" y="${y+4}" text-anchor="end" fill="#6a6d80" font-size="12" font-family="'Barlow Condensed',sans-serif" font-weight="700">${paceStr(p)}</text>`;
    }).join("");
    const kmLabels=pts.filter((_,i)=>splits.length<=10||i%2===0)
      .map(p=>`<text x="${p.x}" y="${H-6}" text-anchor="middle" fill="#6a6d80" font-size="12" font-family="'Barlow Condensed',sans-serif" font-weight="700">km${p.s.km}</text>`).join("");
    // Best dot highlighted green
    const minPace=Math.min(...paces);
    chartSVG=`<div class="card" style="margin-bottom:16px;padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="bc" style="font-size:11px;letter-spacing:2px;color:#4a4d5e">PACE-VERLAUF</div>
        <div class="bc" style="font-size:11px;color:#4a4d5e">↑ schnell &nbsp; ↓ langsam</div>
      </div>
      <svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block">
        ${grids}
        <path d="${area}" fill="#3b82f6" opacity=".08"/>
        <path d="${path}" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        ${pts.map(p=>{
          const isBest=p.s.pace===minPace;
          return `<circle cx="${p.x}" cy="${p.y}" r="${isBest?7:5}" fill="${isBest?"#22c55e":"#3b82f6"}"/>
                  <circle cx="${p.x}" cy="${p.y}" r="${isBest?4:3}" fill="#1e2029"/>`;
        }).join("")}
        ${kmLabels}
      </svg>
    </div>`;
  }

  // km splits table
  const maxSplitPace=hasSplits?Math.max(...splits.map(s=>s.pace)):1;
  const minSplitPace=hasSplits?Math.min(...splits.map(s=>s.pace)):1;
  const splitsTable=hasSplits?`
    <div class="lbl">KM-SPLITS</div>
    <div class="card" style="padding:8px 14px">
    ${splits.map(s=>{
      const isBest=Math.abs(s.pace-minSplitPace)<0.01;
      const barPct=Math.round(((maxSplitPace-s.pace)/(maxSplitPace-minSplitPace+0.01))*80+20);
      return `<div style="padding:10px 0;border-top:1px solid #252836">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <span class="bc" style="font-size:15px;font-weight:700;color:${isBest?"#22c55e":"#6a6d80"}">km ${s.km}</span>
          <span class="bc" style="font-size:22px;font-weight:900;color:${isBest?"#22c55e":"#3b82f6"}">${paceStr(s.pace)}</span>
          <span class="bc" style="font-size:14px;color:#4a4d5e">${(60/s.pace).toFixed(1)} km/h</span>
          ${isBest?`<span class="bc" style="font-size:10px;color:#22c55e;background:#22c55e18;border-radius:8px;padding:2px 7px">BEST</span>`:""}
        </div>
        <div style="background:#252836;border-radius:3px;height:4px;overflow:hidden">
          <div style="width:${barPct}%;height:100%;background:${isBest?"#22c55e":"#3b82f6"};border-radius:3px;opacity:.8"></div>
        </div>
      </div>`;}).join("")}
    </div>`:"";

  return `<div class="screen" style="padding-top:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <button onclick="runsView='list';document.getElementById('app').innerHTML=runsHTML()"
        style="background:#252836;border:none;color:#6a6d80;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px">← ZURÜCK</button>
      <button onclick="deleteRun(${idx})"
        style="background:transparent;border:1px solid #3a3d50;color:#6a6d80;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:11px">🗑 LÖSCHEN</button>
    </div>
    <!-- Header stats -->
    <div class="bc" style="font-weight:900;font-size:42px;color:#3b82f6;line-height:1">${r.km?.toFixed(2)} <span style="font-size:20px;color:#4a4d5e">km</span></div>
    <div class="cp" style="font-size:13px;color:#7a7d8f;margin-top:5px;margin-bottom:18px">${r.date}${r.name?" · "+r.name:""}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div style="background:#1e2029;border:1px solid #2c2f3d;border-radius:13px;padding:16px;text-align:center">
        <div class="bc" style="font-weight:900;font-size:26px;color:#3b82f6">${timeStr}</div>
        <div class="bc" style="font-size:10px;letter-spacing:1.5px;color:#4a4d5e;margin-top:5px">ZEIT</div>
      </div>
      <div style="background:#1e2029;border:1px solid #2c2f3d;border-radius:13px;padding:16px;text-align:center">
        <div class="bc" style="font-weight:900;font-size:26px;color:#3b82f6">${paceDisp}</div>
        <div class="bc" style="font-size:10px;letter-spacing:1.5px;color:#4a4d5e;margin-top:5px">Ø PACE min/km</div>
      </div>
    </div>
    <div style="background:#1e2029;border:1px solid #2c2f3d;border-radius:13px;padding:16px;text-align:center;margin-bottom:16px">
      <div class="bc" style="font-weight:900;font-size:26px;color:#3b82f6">${kmhDisp} <span style="font-size:16px;color:#4a4d5e">km/h</span></div>
      <div class="bc" style="font-size:10px;letter-spacing:1.5px;color:#4a4d5e;margin-top:5px">DURCHSCHNITT</div>
    </div>
    ${chartSVG}
    ${splitsTable}
    <div style="height:20px"></div>
  </div>`;}

/* Pace formatter: converts decimal min/km to M:SS format */
function paceStr(minPerKm){
  const m=Math.floor(minPerKm);
  const s=Math.round((minPerKm-m)*60);
  return m+":"+(s<10?"0"+s:s);
}

/* GPX import – parses <trkpt> lat/lon to compute distance, reads time tags */
function doImportGPX(input){
  const f=input.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const txt=ev.target.result;
      const parser=new DOMParser();
      const xml=parser.parseFromString(txt,"application/xml");
      const runs=[];
      // each <trk> = one activity
      const trks=xml.querySelectorAll("trk");
      trks.forEach(trk=>{
        const nameEl=trk.querySelector("name");
        const name=nameEl?nameEl.textContent.trim():"";
        const pts=Array.from(trk.querySelectorAll("trkpt"));
        if(pts.length<2)return;
        // distance via Haversine
        let distM=0;
        for(let i=1;i<pts.length;i++){
          const la1=+pts[i-1].getAttribute("lat")*Math.PI/180;
          const la2=+pts[i].getAttribute("lat")*Math.PI/180;
          const lo1=+pts[i-1].getAttribute("lon")*Math.PI/180;
          const lo2=+pts[i].getAttribute("lon")*Math.PI/180;
          const dLa=la2-la1,dLo=lo2-lo1;
          const a=Math.sin(dLa/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLo/2)**2;
          distM+=6371000*2*Math.asin(Math.sqrt(a));
        }
        const km=distM/1000;
        // time from first/last trkpt
        const t0=pts[0].querySelector("time");
        const t1=pts[pts.length-1].querySelector("time");
        let secs=0;
        if(t0&&t1){secs=Math.round((new Date(t1.textContent)-new Date(t0.textContent))/1000);}
        // date
        let date="–";
        if(t0){const d=new Date(t0.textContent);date=d.toLocaleDateString("de-DE");}
        // Best pace: find fastest 60s rolling window using segment distances+times
        let bestPaceMpKm=null;
        if(pts.length>2){
          // build cumulative dist+time arrays
          const cumDist=[0],cumTime=[0];
          for(let i=1;i<pts.length;i++){
            const la1=+pts[i-1].getAttribute("lat")*Math.PI/180;
            const la2=+pts[i].getAttribute("lat")*Math.PI/180;
            const lo1=+pts[i-1].getAttribute("lon")*Math.PI/180;
            const lo2=+pts[i].getAttribute("lon")*Math.PI/180;
            const dLa=la2-la1,dLo=lo2-lo1;
            const aa=Math.sin(dLa/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLo/2)**2;
            cumDist.push(cumDist[i-1]+6371000*2*Math.asin(Math.sqrt(aa)));
            const ti=pts[i].querySelector("time");
            const ti1=pts[i-1].querySelector("time");
            const dt=ti&&ti1?Math.max(0,(new Date(ti.textContent)-new Date(ti1.textContent))/1000):0;
            cumTime.push(cumTime[i-1]+dt);
          }
          // sliding window: ~60s
          let j=0;
          for(let i=1;i<pts.length;i++){
            while(cumTime[i]-cumTime[j]>60&&j<i-1)j++;
            const segT=cumTime[i]-cumTime[j];
            const segD=(cumDist[i]-cumDist[j])/1000; // km
            if(segT>10&&segD>0.05){
              const pace=segT/60/segD; // min/km
              if(bestPaceMpKm===null||pace<bestPaceMpKm)bestPaceMpKm=pace;
            }
          }
        }
        // Build km splits
        const kmSplits=[];
        if(pts.length>2){
          let splitDist=0,splitTime=0,splitNum=1;
          for(let i=1;i<pts.length;i++){
            const la1=+pts[i-1].getAttribute("lat")*Math.PI/180;
            const la2=+pts[i].getAttribute("lat")*Math.PI/180;
            const lo1=+pts[i-1].getAttribute("lon")*Math.PI/180;
            const lo2=+pts[i].getAttribute("lon")*Math.PI/180;
            const dLa=la2-la1,dLo=lo2-lo1;
            const aa=Math.sin(dLa/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLo/2)**2;
            const segD=6371000*2*Math.asin(Math.sqrt(aa));
            const ti=pts[i].querySelector("time");
            const ti1=pts[i-1].querySelector("time");
            const segT=ti&&ti1?Math.max(0,(new Date(ti.textContent)-new Date(ti1.textContent))/1000):0;
            splitDist+=segD;splitTime+=segT;
            if(splitDist>=1000){
              const pace=splitTime/60/(splitDist/1000);
              kmSplits.push({km:splitNum,pace:Math.round(pace*10)/10});
              splitNum++;splitDist=0;splitTime=0;
            }
          }
          // last partial km
          if(splitDist>100&&splitTime>0){
            const pace=splitTime/60/(splitDist/1000);
            kmSplits.push({km:splitNum,pace:Math.round(pace*10)/10});
          }
        }
        if(km>0.1)runs.push({date,name,km:Math.round(km*100)/100,secs,bestPace:bestPaceMpKm?Math.round(bestPaceMpKm*10)/10:null,splits:kmSplits});
      });
      if(runs.length===0){showImportMsg("Keine Tracks in GPX gefunden",false);return;}
      rLog=[...rLog,...runs];save();
      showImportMsg("✓ "+runs.length+" Lauf"+(runs.length===1?"":"läufe")+" importiert",true);
      setTimeout(()=>render(),1400);
    }catch(e){showImportMsg("GPX Fehler: "+e.message,false);}
  };
  reader.readAsText(f);
}

/* CSV import (fallback) */
function doImportCSV(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const lines=ev.target.result.trim().split("\n");
      const h=lines[0].split(",");
      const ci=n=>h.findIndex(x=>x.trim().toLowerCase().includes(n));
      const dc=ci("distance")!==-1?ci("distance"):ci("km");
      const tc=ci("duration")!==-1?ci("duration"):ci("time");
      const dtc=ci("date")!==-1?ci("date"):0;
      const imp=lines.slice(1).filter(l=>l.trim()).map(l=>{
        const c=l.split(",");
        return{date:c[dtc]?.trim()||"–",km:dc>=0?parseFloat(c[dc])||0:0,secs:tc>=0?parseFloat(c[tc])||0:0};
      }).filter(r=>r.km>0);
      rLog=[...rLog,...imp];save();
      showImportMsg("✓ "+imp.length+" Läufe importiert",true);
      setTimeout(()=>render(),1400);
    }catch{showImportMsg("Fehler – CSV Format prüfen",false);}
  };
  r.readAsText(f);
}

function showImportMsg(txt,ok){
  const m=document.getElementById("imsg");
  if(m){m.textContent=txt;m.style.color=ok?"#3b82f6":"#ff6b6b";m.style.display="block";}
}

// Build a dynamic muscle map from current plan exercises
function getDynMuscleMap(){
  const dyn={...MUSCLE_MAP};
  Object.values(plans).forEach(p=>{
    p.exercises.forEach(ex=>{
      if(ex.muscle&&ex.muscle.length>0&&!dyn[ex.name]){
        const colorMap={"Rücken":"#60a5fa","Brust & Trizeps":"#f472b6","Core":"#34d399","Schultern":"#fb923c","Beine":"#facc15","Beine & Po":"#fbbf24","Ganzkörper":"#94a3b8","Ausdauer":"#22c55e","Unterarme":"#e2e8f0"};
        const grps=Array.isArray(ex.muscle)?ex.muscle:[ex.muscle];
        dyn[ex.name]={g:grps,c:colorMap[grps[0]]||"#94a3b8"};
      }
    });
  });
  return dyn;
}

function muscleStats(){
  const counts={};
  const dynMap=getDynMuscleMap();
  // Process in chronological order so lastDate/lastSets = most recent
  wLog.forEach(w=>{
    if(!w.exercises)return;
    Object.entries(w.exercises).forEach(([name,sets])=>{
      const m=dynMap[name];
      if(!m)return;
      // Support both single group (string) and multiple groups (array)
      const groups=Array.isArray(m.g)?m.g:[m.g];
      groups.forEach(grp=>{
        if(!counts[grp])counts[grp]={sets:0,color:m.c||'#94a3b8',exercises:{},lastDate:null,lastSets:0};
        counts[grp].sets+=sets.length;
        if(!counts[grp].exercises[name])counts[grp].exercises[name]=0;
        counts[grp].exercises[name]+=sets.length;
        counts[grp].lastDate=w.date;
        counts[grp].lastSets=(counts[grp].lastSets||0)+sets.length;
      });
    });
  });
  // Now fix lastSets: we want only the LAST workout's sets, not cumulative
  // Re-compute by finding most recent date per group
  const lastByGroup={};
  [...wLog].reverse().forEach(w=>{
    if(!w.exercises)return;
    Object.entries(w.exercises).forEach(([name,sets])=>{
      const m=MUSCLE_MAP[name];
      if(!m)return;
      if(!lastByGroup[m.g])lastByGroup[m.g]={date:w.date,sets:0};
      if(lastByGroup[m.g].date===w.date) lastByGroup[m.g].sets+=sets.length;
    });
  });
  Object.entries(lastByGroup).forEach(([g,v])=>{
    if(counts[g]){counts[g].lastDate=v.date;counts[g].lastSets=v.sets;}
  });
  return counts;
}

function allExerciseNames(){
  const names=new Set();
  wLog.forEach(w=>{if(w.exercises)Object.keys(w.exercises).forEach(n=>names.add(n));});
  return [...names].sort();
}

function exerciseProgression(exName){
  const entries=[];
  wLog.forEach(w=>{
    if(!w.exercises||!w.exercises[exName]||!w.exercises[exName].length)return;
    const sets=w.exercises[exName];
    const maxReps=Math.max(...sets.map(s=>parseFloat(s.reps)||0));
    const totalVol=sets.reduce((a,s)=>a+((parseFloat(s.reps)||0)*(parseFloat(s.kg)||1)),0);
    entries.push({date:w.date,maxReps,totalVol,sets,plan:w.plan});
  });
  return entries;
}

function calcPRs(){
  const prs={};
  wLog.forEach(w=>{
    if(!w.exercises)return;
    Object.entries(w.exercises).forEach(([name,sets])=>{
      if(!sets.length)return;
      if(!prs[name])prs[name]={maxReps:0,maxRepsDate:"",maxKg:0,maxKgDate:""};
      sets.forEach(s=>{
        const r=parseFloat(s.reps)||0;
        const k=parseFloat(s.kg)||0;
        if(r>prs[name].maxReps){prs[name].maxReps=r;prs[name].maxRepsDate=w.date;}
        if(k>prs[name].maxKg){prs[name].maxKg=k;prs[name].maxKgDate=w.date;}
      });
    });
  });
  return prs;
}

// Check new PRs from the just-finished workout vs previous wLog
function checkNewPRs(){
  const prevLog=wLog.slice(0,-1); // all but last entry
  const prevPRs={};
  prevLog.forEach(w=>{
    if(!w.exercises)return;
    Object.entries(w.exercises).forEach(([name,sets])=>{
      if(!sets.length)return;
      if(!prevPRs[name])prevPRs[name]={maxReps:0,maxKg:0};
      sets.forEach(s=>{
        const r=parseFloat(s.reps)||0;
        const k=parseFloat(s.kg)||0;
        if(r>prevPRs[name].maxReps)prevPRs[name].maxReps=r;
        if(k>prevPRs[name].maxKg)prevPRs[name].maxKg=k;
      });
    });
  });
  // Compare last entry
  const last=wLog[wLog.length-1];
  if(!last||!last.exercises)return[];
  const newPRs=[];
  Object.entries(last.exercises).forEach(([name,sets])=>{
    if(!sets.length)return;
    const prev=prevPRs[name]||{maxReps:0,maxKg:0};
    sets.forEach(s=>{
      const r=parseFloat(s.reps)||0;
      const k=parseFloat(s.kg)||0;
      if(r>prev.maxReps&&r>0){
        newPRs.push({name,type:"Wdhl",val:r,unit:"Wdhl"});
        prev.maxReps=r; // prevent duplicate
      }
      if(k>prev.maxKg&&k>0){
        newPRs.push({name,type:"Gewicht",val:k,unit:"kg"});
        prev.maxKg=k;
      }
    });
  });
  // Deduplicate by name+type
  const seen=new Set();
  return newPRs.filter(p=>{const k=p.name+p.type;if(seen.has(k))return false;seen.add(k);return true;});
}

function weeklyVolume(){
  const weeks={};
  wLog.forEach(w=>{
    const p=w.date.split(".");
    if(p.length<3)return;
    const d=new Date(+p[2],+p[1]-1,+p[0]);
    const dow=d.getDay()===0?6:d.getDay()-1;
    const mon=new Date(d);mon.setDate(d.getDate()-dow);
    const key=mon.toLocaleDateString("de-DE",{day:"numeric",month:"numeric"});
    if(!weeks[key])weeks[key]={label:key,vol:0,ts:mon.getTime()};
    if(w.exercises){
      Object.values(w.exercises).forEach(sets=>{
        sets.forEach(s=>{weeks[key].vol+=((parseFloat(s.reps)||0)*(parseFloat(s.kg)||1));});
      });
    } else {
      weeks[key].vol+=(w.totalSets||0)*50;
    }
  });
  return Object.values(weeks).sort((a,b)=>a.ts-b.ts).slice(-8);
}

function trainingCalendar(){
  const actDates={};
  wLog.forEach(w=>{actDates[w.date]=(actDates[w.date]||0)+(w.totalSets||0);});
  rLog.forEach(r=>{if(r.date)actDates[r.date]=(actDates[r.date]||0)+5;});
  return actDates;
}

function calendarHTML(){
  // Plan distribution data
  const g={};wLog.forEach(w=>{g[w.plan]=(g[w.plan]||0)+1;});
  // Build per-date type map: what was trained each day
  const dateTypes={};
  wLog.forEach(w=>{
    if(!dateTypes[w.date])dateTypes[w.date]={workout:false,rowing:false,run:false,plans:[]};
    if(w.plan==="ROWING"||w.plan==="RUDERN")dateTypes[w.date].rowing=true;
    else dateTypes[w.date].workout=true;
    dateTypes[w.date].plans.push(w.plan);
  });
  rLog.forEach(r=>{
    if(!r.date)return;
    if(!dateTypes[r.date])dateTypes[r.date]={workout:false,rowing:false,run:false,plans:[]};
    dateTypes[r.date].run=true;
  });

  const today=new Date();
  const dow=today.getDay()===0?6:today.getDay()-1;
  const thisMonday=new Date(today);thisMonday.setDate(today.getDate()-dow);thisMonday.setHours(0,0,0,0);
  const startMonday=new Date(thisMonday);startMonday.setDate(thisMonday.getDate()-9*7);
  const days=[];
  for(let i=0;i<70;i++){
    const d=new Date(startMonday);d.setDate(startMonday.getDate()+i);
    const ds=d.toLocaleDateString("de-DE");
    const types=dateTypes[ds]||null;
    const isToday=d.toDateString()===today.toDateString();
    days.push({d,ds,types,isToday});
  }

  // Cell: show 1-3 small letter badges per day
  function dayCell(types,isToday,ds){
    if(!types&&!isToday) return `<div style="aspect-ratio:1;border-radius:4px;background:#1a1c25;border:1px solid #252836"></div>`;
    if(!types&&isToday) return `<div style="aspect-ratio:1;border-radius:4px;background:#1a1c25;outline:2px solid #22c55e"></div>`;
    const dots=[];
    if(types.workout) dots.push("#22c55e");
    if(types.rowing)  dots.push("#ff5c1a");
    if(types.run)     dots.push("#3b82f6");
    // Single type: fill cell with that color; multiple: show dots
    if(dots.length===1){
      return `<div style="aspect-ratio:1;border-radius:4px;background:${dots[0]}33;${isToday?"outline:2px solid "+dots[0]+";":""}border:1px solid ${dots[0]}66"></div>`;
    }
    return `<div style="aspect-ratio:1;border-radius:4px;background:#252836;${isToday?"outline:2px solid #22c55e;":""}display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:2px">
      ${dots.map(c=>`<div style="width:5px;height:5px;border-radius:50%;background:${c}"></div>`).join("")}
    </div>`;
  }

  const dayLabels=["Mo","Di","Mi","Do","Fr","Sa","So"];
  // Recent active days list
  const recentDays=Object.entries(dateTypes)
    .sort((a,b)=>b[0].split(".").reverse().join("").localeCompare(a[0].split(".").reverse().join("")))
    .slice(0,15);

  return `<div class="screen" style="padding-top:16px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <button onclick="setStatsView('overview')" style="background:#252836;border:none;color:#6a6d80;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px">← ZURÜCK</button>
      <div class="bc" style="font-weight:900;font-size:20px;color:#22c55e;letter-spacing:1px">TRAININGSKALENDER</div>
    </div>
    <!-- Legend -->
    <div style="display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap">
      ${[["#22c55e","Workout"],["#ff5c1a","Rudern"],["#3b82f6","Laufen"]].map(([c,name])=>`
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:14px;height:14px;border-radius:3px;background:${c}33;border:1px solid ${c}66"></div>
          <span class="bc" style="font-size:10px;color:#4a4d5e;letter-spacing:.5px">${name}</span>
        </div>`).join("")}
    </div>
    <div class="card" style="margin-bottom:16px;padding:12px">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:5px">
        ${dayLabels.map(l=>`<div class="bc" style="font-size:9px;color:#4a4d5e;text-align:center">${l}</div>`).join("")}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">
        ${days.map(({types,isToday,ds})=>dayCell(types,isToday,ds)).join("")}
      </div>
    </div>
    <div class="lbl">LETZTE AKTIVE TAGE</div>
    ${recentDays.map(([date,types])=>{
      const tags=[];
      if(types.workout)tags.push({l:"W",c:"#22c55e",name:types.plans.filter(p=>p!=="ROWING"&&p!=="RUDERN").join(", ")||"Workout"});
      if(types.rowing) tags.push({l:"R",c:"#ff5c1a",name:"Rudern"});
      if(types.run)    tags.push({l:"L",c:"#3b82f6",name:"Laufen"});
      return `<div class="card" style="margin-bottom:7px;display:flex;justify-content:space-between;align-items:center">
        <div class="bc" style="font-weight:700;font-size:15px">${date}</div>
        <div style="display:flex;gap:6px">
          ${tags.map(t=>`<div style="display:flex;align-items:center;gap:4px;background:${t.c}18;border:1px solid ${t.c}44;border-radius:8px;padding:3px 8px">
            <span class="bc" style="font-weight:900;font-size:12px;color:${t.c}">${t.l}</span>
            <span class="bc" style="font-size:10px;color:${t.c}">${t.name}</span>
          </div>`).join("")}
        </div>
      </div>`;}).join("")}
    <!-- Plan distribution -->
    ${Object.keys(g).length>0?`
    <div class="lbl" style="margin-top:4px">PLAN-VERTEILUNG</div>
    <div class="card" style="margin-bottom:16px;padding:14px">
      ${Object.entries(g).sort((a,b)=>b[1]-a[1]).map(([plan,count])=>{
        const pct=Math.round(count/wLog.length*100);
        return `<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <span class="bc" style="font-weight:700;font-size:15px">${plan}</span>
            <span class="bc" style="font-size:13px;color:#38bdf8">${count}× <span style="color:#4a4d5e;font-size:11px">(${pct}%)</span></span>
          </div>
          <div style="background:#252836;border-radius:3px;height:4px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:#38bdf8;border-radius:3px;opacity:.8"></div>
          </div>
        </div>`;}).join("")}
    </div>`:""}
    <div style="height:20px"></div>
  </div>`;}

function exportBackup(){
  const data={wLog,sP,rLog,exportDate:new Date().toISOString(),version:1};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="training-backup-"+new Date().toLocaleDateString("de-DE").replace(/\./g,"-")+".json";
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

function importBackup(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.wLog&&!d.rLog&&!d.sP)throw new Error("Kein gültiges Backup");
      wLog=d.wLog||[];sP=d.sP||{};rLog=d.rLog||[];
      save();
      const m=document.getElementById("restore-msg");
      if(m){m.textContent="✓ Backup wiederhergestellt! "+wLog.length+" Workouts, "+rLog.length+" Läufe.";m.style.color="#22c55e";m.style.display="block";}
      setTimeout(()=>render(),1600);
    }catch(e){
      const m=document.getElementById("restore-msg");
      if(m){m.textContent="Fehler: "+e.message;m.style.color="#ff6b6b";m.style.display="block";}
    }
  };
  r.readAsText(f);
}

        <div style="display:flex;gap:8px">
          <button onclick="updEx('type','reps');updEx('secs',null);document.getElementById('app').innerHTML=editorHTML()" style="flex:1;padding:10px;border-radius:9px;border:1px solid ${ex.type==='reps'?"#22c55e":"#2c2f3d"};background:${ex.type==='reps'?"#22c55e22":"#1e2029"};color:${ex.type==='reps'?"#22c55e":"#7a7d8f"};font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;cursor:pointer">WDHL</button>
          <button onclick="updEx('type','time');updEx('reps',null);document.getElementById('app').innerHTML=editorHTML()" style="flex:1;padding:10px;border-radius:9px;border:1px solid ${ex.type==='time'?"#22c55e":"#2c2f3d"};background:${ex.type==='time'?"#22c55e22":"#1e2029"};color:${ex.type==='time'?"#22c55e":"#7a7d8f"};font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;cursor:pointer">ZEIT</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div class="lbl">SÄTZE</div>
          <input type="number" value="${ex.sets}" min="1" max="20" oninput="updEx('sets',+this.value)"
            style="width:100%;background:#1e2029;border:1px solid #2c2f3d;border-radius:10px;padding:12px;color:#eceae4;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;text-align:center;outline:none"/>
        </div>
        ${ex.type==="reps"?`<div>
          <div class="lbl">WDHL</div>
          <input type="number" value="${ex.reps||""}" min="1" oninput="updEx('reps',+this.value||null)"
            style="width:100%;background:#1e2029;border:1px solid #2c2f3d;border-radius:10px;padding:12px;color:#eceae4;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;text-align:center;outline:none" placeholder="—"/>
        </div>`:`<div>
          <div class="lbl">SEKUNDEN</div>
          <input type="number" value="${ex.secs||""}" min="1" oninput="updEx('secs',+this.value||null)"
            style="width:100%;background:#1e2029;border:1px solid #2c2f3d;border-radius:10px;padding:12px;color:#eceae4;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;text-align:center;outline:none" placeholder="—"/>
        </div>`}
      </div>
      <div>
        <div class="lbl">GEWICHT (kg) – optional</div>
        <input type="number" value="${ex.kg||""}" min="0" step="0.5" oninput="updEx('kg',+this.value||null)"
          style="width:100%;background:#1e2029;border:1px solid #2c2f3d;border-radius:10px;padding:12px 14px;color:#eceae4;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;text-align:center;outline:none" placeholder="Kein Gewicht"/>
      </div>
      <div>
        <div class="lbl">MUSKELGRUPPE</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${[["Rücken","#60a5fa"],["Brust & Trizeps","#f472b6"],["Core","#34d399"],["Schultern","#fb923c"],["Beine","#facc15"],["Beine & Po","#fbbf24"],["Ganzkörper","#94a3b8"],["Ausdauer","#22c55e"],["Unterarme","#e2e8f0"]].map(([g,c])=>{
            const muscles=Array.isArray(ex.muscle)?ex.muscle:(ex.muscle?[ex.muscle]:[]);
            const sel=muscles.includes(g);
            return `<button onclick="toggleMuscleGroup('${g}');document.getElementById('app').innerHTML=editorHTML()"
              style="padding:6px 12px;border-radius:20px;border:1px solid ${sel?c:c+"44"};background:${sel?c+"22":"transparent"};color:${sel?c:"#4a4d5e"};font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;cursor:pointer">
              ${sel?"✓ ":""}${g}</button>`;
          }).join("")}
          <button onclick="updEx('muscle',[]);document.getElementById('app').innerHTML=editorHTML()"
            style="padding:6px 12px;border-radius:20px;border:1px solid #3a3d50;background:transparent;color:#4a4d5e;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;cursor:pointer">✕ Alle entfernen</button>
        </div>
        <div class="bc" style="font-size:10px;color:#4a4d5e;margin-top:6px">
          ${(Array.isArray(ex.muscle)?ex.muscle:(ex.muscle?[ex.muscle]:[])).length>0
            ?"Gewählt: "+(Array.isArray(ex.muscle)?ex.muscle:[ex.muscle]).join(" · ")
            :"Keine Gruppe → erscheint nicht in Körperbereiche"}
        </div>
      </div>
    </div>
    <div style="margin-top:24px">
      <button onclick="removeEx(edState.exIdx);edState.view='plan';document.getElementById('app').innerHTML=editorHTML()"
        style="width:100%;background:transparent;border:1px solid #3a3d50;color:#6a6d80;padding:14px;border-radius:11px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:1px">
        🗑 ÜBUNG ENTFERNEN
      </button>
    </div>
  </div>`;}

function updEx(field,val){
  if(!plans[edState.planId])return;
  plans[edState.planId].exercises[edState.exIdx][field]=val;
  save();
}
function toggleMuscleGroup(grp){
  if(!plans[edState.planId])return;
  const ex=plans[edState.planId].exercises[edState.exIdx];
  let muscles=Array.isArray(ex.muscle)?[...ex.muscle]:(ex.muscle?[ex.muscle]:[]);
  if(muscles.includes(grp)) muscles=muscles.filter(m=>m!==grp);
  else muscles.push(grp);
  ex.muscle=muscles;
  save();
}
function moveEx(i,dir){
  const exs=plans[edState.planId].exercises;
  const j=i+dir;
  if(j<0||j>=exs.length)return;
  [exs[i],exs[j]]=[exs[j],exs[i]];
  save();
  document.getElementById("app").innerHTML=editorHTML();
}
function removeEx(i){
  showModal("Übung entfernen?","Übung aus diesem Plan löschen?","ENTFERNEN","#ff6b6b",()=>{
    plans[edState.planId].exercises.splice(i,1);
    save();
    edState.view="plan";
    document.getElementById("app").innerHTML=editorHTML();
  });
}
function addEx(){
  plans[edState.planId].exercises.push({name:"Neue Übung",sets:3,reps:10,kg:null,type:"reps"});
  save();
  edState.exIdx=plans[edState.planId].exercises.length-1;
  edState.view="exercise";
  document.getElementById("app").innerHTML=editorHTML();
}
function addNewPlan(){
  const id="plan_"+Date.now();
  plans[id]={label:"NEUER PLAN",color:"#22c55e",exercises:[]};
  save();
  edState={planId:id,view:"plan"};
  document.getElementById("app").innerHTML=editorHTML();
}
function deletePlan(id){
  showModal("Plan löschen?","Diesen Plan wirklich entfernen? Trainingsdaten bleiben erhalten.","LÖSCHEN","#ff6b6b",()=>{
    delete plans[id];
    save();
    edState={planId:null,view:"list"};
    document.getElementById("app").innerHTML=editorHTML();
  });
}

render();

// Load from Supabase and migrate old data
migrateIfNeeded().then(() => {
  return sbLoad();
}).then(() => {
  render();
}).catch(err => {
  console.error('Init error:', err);
  render();
});
</script>
</body>
</html>
